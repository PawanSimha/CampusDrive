{% extends "base.html" %}
{% block title %}500 - System Pulse Interrupted{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-6">
    <div class="max-w-md w-full text-center space-y-8">
        <div class="relative">
            <div class="w-32 h-32 bg-red-50 rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 border border-red-100">
                <span class="material-symbols-rounded text-6xl text-red-300">warning</span>
            </div>
            <div class="absolute -bottom-2 right-1/2 translate-x-16 bg-red-500 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider shadow-lg">Error 500</div>
        </div>
        
        <div class="space-y-4">
            <h1 class="text-4xl font-bold text-brand-blue tracking-tight font-poppins">System Failure.</h1>
            <p class="text-slate-500 font-medium leading-relaxed italic">"Our servers encountered an unexpected interruption in the transmission. Our engineers have been alerted."</p>
        </div>

        <div class="pt-6">
            <a href="/" class="inline-flex items-center gap-3 bg-brand-blue text-white px-10 py-5 rounded-2xl font-bold text-xs uppercase tracking-wider shadow-2xl shadow-blue-900/20 hover:scale-105 transition-all no-underline font-openSans">
                <span class="material-symbols-rounded">refresh</span> Retry Transmission
            </a>
        </div>
    </div>
</div>
{% endblock %}
