{% extends "base.html" %}
{% block title %}Share Knowledge{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-6 pt-10 pb-32">
    <div class="text-center mb-16 space-y-4">
        <div
            class="w-16 h-16 bg-brand-orange text-white rounded-2xl flex items-center justify-center mx-auto shadow-xl shadow-orange-900/20">
            <span class="material-symbols-rounded text-3xl">cloud_upload</span>
        </div>
        <h1 class="text-4xl font-bold text-brand-blue tracking-tight font-poppins">Archive Knowledge.</h1>
        <p class="text-slate-500 font-medium italic text-sm">"Transmit your resources to the Campus Drive repository."
        </p>
    </div>

    <div class="bg-white p-10 lg:p-12 rounded-[2.5rem] border border-slate-200 shadow-sm">
        <form method="POST" class="space-y-8">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-brand-blue uppercase tracking-wider ml-1 font-openSans">Archive
                    Title</label>
                <input type="text" name="title"
                    class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 text-sm font-medium focus:bg-white focus:border-brand-blue/20 outline-none transition-all"
                    placeholder="e.g., Data Structures Midterm Notes" required>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label
                        class="text-[10px] font-bold text-brand-blue uppercase tracking-wider ml-1 font-openSans">Academic
                        Discipline</label>
                    <input type="text" name="subject"
                        class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 text-sm font-medium focus:bg-white focus:border-brand-blue/20 outline-none transition-all"
                        placeholder="e.g., Computer Science" required>
                </div>
                <div class="space-y-2">
                    <label
                        class="text-[10px] font-bold text-brand-blue uppercase tracking-wider ml-1 font-openSans">Asset
                        Category</label>
                    <select name="resource_type"
                        class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 text-sm font-bold text-brand-blue uppercase tracking-tight outline-none focus:bg-white focus:border-brand-blue/20 transition-all cursor-pointer">
                        <option value="Notes">Notes</option>
                        <option value="Previous Year">Previous Year Papers</option>
                        <option value="Assignment">Assignment Solutions</option>
                        <option value="Reference">Reference Material</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label
                    class="text-[10px] font-bold text-brand-blue uppercase tracking-wider ml-1 font-openSans">Protocol /
                    Access</label>
                <select name="privacy"
                    class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 text-sm font-bold text-brand-blue uppercase tracking-tight outline-none focus:bg-white focus:border-brand-blue/20 transition-all cursor-pointer">
                    <option value="public">🌐 Public Access (Universal)</option>
                    <option value="private">🔒 Private (Restricted to My Circles)</option>
                </select>
            </div>

            <div class="space-y-2">
                <label
                    class="text-[10px] font-bold text-brand-blue uppercase tracking-wider ml-1 font-openSans">Description
                    / Metadata</label>
                <textarea name="description"
                    class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 text-sm font-medium focus:bg-white focus:border-brand-blue/20 outline-none transition-all min-h-[120px] resize-none"
                    placeholder="Provide a brief context of this resource..." required></textarea>
            </div>

            <div class="pt-6">
                <button type="submit"
                    class="w-full bg-brand-blue text-white py-6 rounded-2xl font-bold text-xs uppercase tracking-wider shadow-2xl shadow-blue-900/20 hover:scale-[1.02] transition-all font-openSans">Initiate
                    Transmission</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
